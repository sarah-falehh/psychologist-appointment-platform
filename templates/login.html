{% extends "base.html" %}

{% block title %}
{{ content.auth.login_title }}
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="container">

        <div class="auth-card">

            <div class="auth-introduction">

                <p class="section-label">
                    {{ content.auth.patient_area }}
                </p>

                <h1>
                    {{ content.auth.login_title }}
                </h1>

                <p>
                    {{ content.auth.login_description }}
                </p>

            </div>


            <form
                class="auth-form"
                method="POST"
                action="{{ url_for('login') }}"
            >

                <div class="form-group">

                    <label for="login-email">
                        {{ content.auth.email }}
                    </label>

                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        autocomplete="email"
                        required
                    >

                </div>


                <div class="form-group">

                    <label for="login-password">
                        {{ content.auth.password }}
                    </label>

                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="button button-primary"
                >
                    {{ content.auth.login_button }}
                </button>


                <p class="auth-link">

                    {{ content.auth.no_account }}

                    <a href="{{ url_for('signup') }}">
                        {{ content.auth.signup_link }}
                    </a>

                </p>

            </form>

        </div>

    </div>

</section>

{% endblock %}
